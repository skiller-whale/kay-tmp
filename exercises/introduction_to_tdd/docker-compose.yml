services:
  exercises:
    build: .
    volumes:
      - ./src:/introduction_to_tdd/src
      - ./build.gradle:/introduction_to_tdd/build.gradle
      - ./gradle.properties:/introduction_to_tdd/gradle.properties
      - ./scripts:/introduction_to_tdd/scripts
    working_dir: /introduction_to_tdd
    tty: true
    command:
      - -lc
      - |
        echo 'trap "echo ‼️ You just quit the exercises terminal.; echo To get it back run: docker compose run exercises" EXIT' >> /root/.bashrc
        echo "To run the tests:"
        echo "  gradle test"
        echo "Or for watch mode:"
        echo "  gradle test --continuous"
        exec /bin/bash -l
  tests:
    build: .
    volumes:
      - ./src:/introduction_to_tdd/src
      - ./build.gradle:/introduction_to_tdd/build.gradle
      - ./gradle.properties:/introduction_to_tdd/gradle.properties
      - ./scripts:/introduction_to_tdd/scripts
    working_dir: /introduction_to_tdd
    command:
      - -c
      - gradle test --continuous --console=rich --warning-mode none
